name: Collect Bus ETA Data

on:
  schedule:
    # 香港时间 07:00 - 23:55 之间，每 5 分钟运行一次
    # 注意：cron 使用 UTC 时间，香港时间 = UTC+8
    # 香港 07:00 = UTC 23:00 (前一天)
    # 香港 08:00 = UTC 00:00
    # 香港 24:00 = UTC 16:00

    # 香港时间 08:00 - 23:55（UTC 00:00 - 15:55）
    - cron: "*/5 0-15 * * *"

    # 香港时间 07:00 - 07:55（UTC 23:00 - 23:55）
    - cron: "*/5 23 * * *"

  # 手动触发
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run bus ETA collector
        run: python bus_eta_collector.py

      - name: Upload data
        uses: actions/upload-artifact@v4
        with:
          name: bus_eta_data_${{ github.run_id }}
          path: bus_eta_data.csv
