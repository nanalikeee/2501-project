name: Collect Bus and Minibus ETA Data

on:
  schedule:
    - cron: "*/5 0-15 * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run 收集ETA九巴.py
        run: python "收集ETA九巴.py"

      - name: Run 小巴收集信息.py
        run: python "小巴收集信息.py"

      - name: Upload data
        uses: actions/upload-artifact@v4
        with:
          name: eta_data_${{ github.run_id }}
          path: |
            bus_eta_data.csv
            gmb_eta_data.csv
